<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g stroke="#cbd5e1" stroke-width="1" opacity="0.3">
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
  </g>

  <!-- Top-right accent blob -->
  <circle cx="1100" cy="80" r="300" fill="#4f46e5" opacity="0.08" />
  <circle cx="100" cy="550" r="250" fill="#7c3aed" opacity="0.06" />

  <!-- Content -->
  <g transform="translate(100, 180)">
    <!-- Logo-ish mark -->
    <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#accent)" />
    <path d="M20 32 L32 20 L44 32 M32 20 L32 44" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- Title -->
    <text x="0" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#0f172a" letter-spacing="-0.03em">
      CA SDI Navigator
    </text>

    <!-- Subtitle -->
    <text x="0" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#475569">
      A specialized resource for FedEx pilots
    </text>

    <!-- URL -->
    <text x="0" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#64748b" letter-spacing="0.05em">
      Navigate California State Disability Insurance &amp; Hartford LTD
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="100" y="580" width="200" height="6" rx="3" fill="url(#accent)" />
</svg>
